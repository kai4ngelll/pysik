            background-size:cover; background-position:center;
            filter: blur(14px) brightness(0.55);
            transform:scale(1.08);
        }
        .bg-overlay {
            position:fixed; inset:0; z-index:1;
            background:linear-gradient(180deg, rgba(10,10,12,0.55) 0%, rgba(10,10,12,0.75) 60%, rgba(10,10,12,0.92) 100%);
        }

        /* ── HEADER ───────────────────────────────────────────── */
        .hdr { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; }
        .hdr-btn {
            font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
            color:var(--t1); background:rgba(255,255,255,0.08); border:1px solid var(--line2); border-radius:30px;
            padding:9px 18px; text-decoration:none; backdrop-filter:blur(8px);
            display:inline-flex; align-items:center; gap:6px; transition:background 0.2s;
        }
        .hdr-btn:active { background:rgba(255,255,255,0.16); }
        .hdr-logo { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.1em; color:var(--t1); }
        .hdr-logo em { color:var(--accent2); font-style:normal; }

        /* ── MAIN LAYOUT ──────────────────────────────────────── */
        .stage { position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; min-height:calc(100vh - 60px); padding:6px 18px 26px; }

        /* смайлики, поднимающиеся вверх */
        .reaction-lane { position:relative; width:100%; max-width:360px; height:64px; display:flex; align-items:flex-end; justify-content:center; pointer-events:none; }
        .reaction-emoji {
            position:absolute; bottom:0; font-size:30px; opacity:0;
            animation: floatUp 1.6s ease-out forwards;
        }
        @keyframes floatUp {
            0%   { opacity:0; transform:translateY(10px) scale(0.6); }
            15%  { opacity:1; transform:translateY(0) scale(1.05); }
            30%  { transform:translateY(-6px) scale(1); }
            100% { opacity:0; transform:translateY(-90px) scale(0.9); }
        }

        /* фото Пушика по центру */
        .pushik-wrap { position:relative; margin-top:4px; }
        .pushik-photo {
            width:min(70vw, 300px); height:auto; object-fit:contain;
            filter: drop-shadow(0 18px 40px rgba(0,0,0,0.55)) drop-shadow(0 0 40px rgba(255,255,255,0.06));
            transition:transform 0.25s ease, filter 0.25s ease;
        }
        .pushik-wrap.mood-good .pushik-photo { filter: drop-shadow(0 18px 40px rgba(0,0,0,0.55)) drop-shadow(0 0 26px rgba(126,224,138,0.55)); transform:scale(1.04); }
        .pushik-wrap.mood-bad .pushik-photo { filter: drop-shadow(0 18px 40px rgba(0,0,0,0.55)) drop-shadow(0 0 26px rgba(224,112,122,0.55)); animation:shake 0.4s ease; }
        @keyframes shake {
            0%,100% { transform:translateX(0); }
            25% { transform:translateX(-6px); }
            75% { transform:translateX(6px); }
        }

        .pushik-name { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.08em; color:#fff; margin-top:14px; }
        .pushik-progress { display:flex; gap:6px; margin-top:10px; }
        .progress-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.25); transition:background 0.3s; }
        .progress-dot.done { background:var(--good); border-color:var(--good); }
        .progress-dot.fail { background:var(--bad); border-color:var(--bad); }

        /* карточка вопроса */
        .quiz-card { width:100%; max-width:380px; margin-top:22px; background:rgba(17,17,20,0.72); border:1px solid var(--line2); border-radius:22px; padding:22px 20px 20px; backdrop-filter:blur(10px); }
        .quiz-counter { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--t3); text-transform:uppercase; text-align:center; margin-bottom:10px; }
        .quiz-question { font-family:'Inter',sans-serif; font-size:17px; font-weight:700; color:#fff; text-align:center; line-height:1.35; margin-bottom:18px; min-height:44px; display:flex; align-items:center; justify-content:center; }

        .quiz-options { display:flex; flex-direction:column; gap:10px; }
        .quiz-opt {
            font-family:'Inter',sans-serif; font-size:14.5px; font-weight:600; color:var(--t1);
            background:var(--s2); border:1px solid var(--line2); border-radius:14px; padding:14px 16px;
            cursor:pointer; text-align:center; transition:transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .quiz-opt:active { transform:scale(0.97); }
        .quiz-opt.correct { background:rgba(126,224,138,0.18); border-color:var(--good); color:var(--good); }
        .quiz-opt.wrong { background:rgba(224,112,122,0.18); border-color:var(--bad); color:var(--bad); }
        .quiz-opt.disabled { pointer-events:none; opacity:0.55; }

        /* финальный экран */
        .final-card { width:100%; max-width:380px; margin-top:22px; background:rgba(17,17,20,0.78); border:1px solid var(--line2); border-radius:22px; padding:30px 24px; text-align:center; backdrop-filter:blur(10px); }
        .final-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.06em; color:#fff; margin-bottom:8px; }
        .final-sub { font-family:'Inter',sans-serif; font-size:14px; color:var(--t2); line-height:1.5; margin-bottom:20px; }
        .final-coin { display:flex; align-items:center; justify-content:center; gap:10px; background:var(--s1); border:1px solid var(--line2); border-radius:16px; padding:14px 20px; margin-bottom:20px; }
        .final-coin .fc-icon { width:26px; height:26px; border-radius:50%; background:radial-gradient(circle at 32% 28%,#fff 0%,#ddd 20%,#aaa 50%,#777 80%,#555 100%); border:1px solid #ccc; flex-shrink:0; }
        .final-coin span { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:var(--accent2); }
        .final-btn {
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; color:#0a0a0c;
            background:linear-gradient(135deg,#e8e8ec 0%,#b8b8c0 50%,#8c8c94 100%);
            border:none; border-radius:14px; padding:14px 30px; cursor:pointer; text-decoration:none; width:100%;
        }
        .final-btn:active { transform:scale(0.98); }
        .final-btn.secondary { background:var(--s2); color:var(--t1); border:1px solid var(--line2); margin-top:10px; }
    </style>
</head>

    <div class="pushik-name">Пушик</div>
    <div class="pushik-progress" id="progressDots"></div>

    <div class="quiz-card" id="quizCard">
        <div class="quiz-counter" id="quizCounter">Вопрос 1 / 7</div>
        <div class="quiz-question" id="quizQuestion">—</div>
        <div class="quiz-options" id="quizOptions"></div>
    </div>

    <div class="final-card" id="finalCard" style="display:none;">
        <div class="final-title" id="finalTitle">Готово!</div>
        <div class="final-sub" id="finalSub">Пушик доволен тобой.</div>
        <div class="final-coin" id="finalCoinBox" style="display:none;">
            <div class="fc-icon"></div>
            <span>+1 Пушкоин начислен</span>
        </div>

<script>
(function () {
    'use strict';

    const CSK = 'pushko_coins_v1';
    const MAX_COINS = 9999;

    // ── STORAGE (тот же формат, что и на index.html) ─────────────
    const Storage = {
        get(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } },
        set(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch { return false; } }
    };
    function addCoins(uid, amount) {
        if (!uid) return;
        const all = Storage.get(CSK) || {};
        const current = Math.min(Math.max(0, parseInt(all[uid]) || 0), MAX_COINS);
        all[uid] = Math.min(current + amount, MAX_COINS);
        Storage.set(CSK, all);
    }

    // ── ОПРЕДЕЛЯЕМ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ (тот же принцип, что на index.html) ──
    function getCurrentUserId(cb) {
        function attempt(n) {
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
            if (tgUser && tgUser.id) { cb(String(tgUser.id)); return; }
            if (n < 4) { setTimeout(() => attempt(n + 1), 400); return; }
            const GUEST_KEY = 'pgm_guest_id';
            let gid = localStorage.getItem(GUEST_KEY);
            if (!gid) { gid = 'guest_' + Math.random().toString(36).slice(2, 10); localStorage.setItem(GUEST_KEY, gid); }
            cb(gid);
        }
        attempt(0);
    }

    if (window.Telegram?.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        try { tg.disableVerticalSwipes(); } catch {}
        try { tg.setHeaderColor('#0a0a0c'); } catch {}
        try { tg.setBackgroundColor('#0a0a0c'); } catch {}
    }

    let currentUserId = null;
    getCurrentUserId(id => { currentUserId = id; });

    // ── БАНК ВОПРОСОВ ──────────────────────────────────────────
    // Каждый вопрос: текст + варианты, где ровно один помечен correct:true.
    // Порядок вариантов внутри вопроса перемешивается, порядок самих
    // вопросов тоже перемешивается при каждом запуске игры.
    const QUESTION_BANK = [
        {
            options: [
                { text: 'Погладить', correct: true },
                { text: 'Дать леща', correct: false }
            ]
        },
        {
            options: [
                { text: 'Покормить жидким кормом', correct: false },
                { text: 'Покормить сухим кормом', correct: true }
            ]
        },
        {
            question: 'Пушик — правитель жира?',
            options: [
                { text: 'Да', correct: false },
                { text: 'Нет, он правитель мира', correct: true }
            ]
        },
        {
            options: [
                { text: 'Дать понюхать носки', correct: true },
                { text: 'Дать понюхать подмышки', correct: false }
            ]
        },
        {
            options: [
                { text: 'Оставить яйца', correct: false },
                { text: 'Кастрировать', correct: true }
            ]
        },
        {
            question: 'Как зовут хозяина Пушика?',
            options: [
                { text: 'Наймаз', correct: false },
                { text: 'Лиза', correct: true }
            ]
        },
        {
            question: 'Пушик встречается со Сникерсом?',
            options: [
                { text: 'Да, они вместе', correct: true },
                { text: 'Нет, Пушик одинокий', correct: false }
            ]
        }
    ];

    // тексты-вопросы по умолчанию для вариантов без явного question
    const DEFAULT_PROMPTS = [
        'Что нужно сделать с Пушиком?',
        'Чем покормить Пушика?',
        null,
        'Что дать понюхать Пушику?',
        'Что нужно сделать с Пушиком?',
        null,
        null
    ];

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ── СОСТОЯНИЕ ИГРЫ ──────────────────────────────────────────
    let sessionQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answered = false;

    const els = {
        counter: document.getElementById('quizCounter'),
        question: document.getElementById('quizQuestion'),
        options: document.getElementById('quizOptions'),
        quizCard: document.getElementById('quizCard'),
        finalCard: document.getElementById('finalCard'),
        finalTitle: document.getElementById('finalTitle'),
        finalSub: document.getElementById('finalSub'),
        finalCoinBox: document.getElementById('finalCoinBox'),
        retryBtn: document.getElementById('retryBtn'),
        progressDots: document.getElementById('progressDots'),
        reactionLane: document.getElementById('reactionLane'),
        pushikWrap: document.getElementById('pushikWrap')
    };

    function buildProgressDots() {
        els.progressDots.innerHTML = '';
        for (let i = 0; i < sessionQuestions.length; i++) {
            const d = document.createElement('div');
            d.className = 'progress-dot';
            d.id = 'dot-' + i;
            els.progressDots.appendChild(d);
        }
    }

    function startGame() {
        sessionQuestions = shuffle(QUESTION_BANK.map((q, i) => ({ ...q, _origIndex: i })));
        currentIndex = 0;
        correctCount = 0;
        answered = false;
        els.finalCard.style.display = 'none';
        els.quizCard.style.display = 'block';
        buildProgressDots();
        renderQuestion();
    }

    function renderQuestion() {
        answered = false;
        const q = sessionQuestions[currentIndex];
        const promptText = q.question || DEFAULT_PROMPTS[q._origIndex] || 'Как поступить с Пушиком?';
        els.counter.textContent = `Вопрос ${currentIndex + 1} / ${sessionQuestions.length}`;
        els.question.textContent = promptText;

        const opts = shuffle(q.options);
        els.options.innerHTML = '';
        opts.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'quiz-opt';
            btn.textContent = opt.text;
            btn.addEventListener('click', () => handleAnswer(opt, btn, opts));
            els.options.appendChild(btn);
        });
    }

    function spawnReaction(emoji, count = 6) {
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'reaction-emoji';
                el.textContent = emoji;
                el.style.left = (18 + Math.random() * 64) + '%';
                el.style.animationDuration = (1.3 + Math.random() * 0.6) + 's';
                el.style.fontSize = (24 + Math.random() * 14) + 'px';
                els.reactionLane.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }, i * 70);
        }
    }

    function handleAnswer(chosen, btnEl, allOpts) {
        if (answered) return;
        answered = true;

        const allBtns = Array.from(els.options.children);
        allBtns.forEach(b => b.classList.add('disabled'));

        if (chosen.correct) {
            btnEl.classList.add('correct');
            correctCount++;
            spawnReaction('🥰');
            const dot = document.getElementById('dot-' + currentIndex);
            if (dot) dot.classList.add('done');
            els.pushikWrap.classList.remove('mood-bad');
            els.pushikWrap.classList.add('mood-good');
        } else {
            btnEl.classList.add('wrong');
            // подсветим правильный вариант
            const correctOpt = allOpts.find(o => o.correct);
            allBtns.forEach(b => { if (b.textContent === correctOpt.text) b.classList.add('correct'); });
            spawnReaction('😡');
            const dot = document.getElementById('dot-' + currentIndex);
            if (dot) dot.classList.add('fail');
            els.pushikWrap.classList.remove('mood-good');
            els.pushikWrap.classList.add('mood-bad');
        }

        setTimeout(() => {
            els.pushikWrap.classList.remove('mood-good', 'mood-bad');
            currentIndex++;
            if (currentIndex < sessionQuestions.length) {
                renderQuestion();
            } else {
                finishGame();
            }
        }, 1100);
    }

    function finishGame() {
        els.quizCard.style.display = 'none';
        els.finalCard.style.display = 'block';
        const allCorrect = correctCount === sessionQuestions.length;

        if (allCorrect) {
            els.finalTitle.textContent = 'Пушик доволен! 🥰';
            els.finalSub.textContent = 'Ты ублажил Пушика по всем пунктам. Он теперь весёлый, добрый и сытый кот.';
            els.finalCoinBox.style.display = 'flex';
            addCoins(currentUserId, 1);
        } else {
            els.finalTitle.textContent = 'Пушик недоволен 😾';
            els.finalSub.textContent = `Правильных ответов: ${correctCount} из ${sessionQuestions.length}. Пушкоин даётся только за идеальный результат — попробуй ещё раз!`;
            els.finalCoinBox.style.display = 'none';
        }
    }

    els.retryBtn.addEventListener('click', startGame);

    startGame();
})();
</script>
</body>
</html>
